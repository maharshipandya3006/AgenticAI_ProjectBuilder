<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Calculator</title>
<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>
<body>
<div id="calculator" class="calculator">
<div id="display" class="display" aria-live="polite"></div>
<div class="buttons">
<button data-key="C" data-action="clear" aria-label="Clear">C</button>
<button data-key="←" data-action="backspace" aria-label="Backspace">←</button>
<button data-key="/" aria-label="Divide">/</button>
<button data-key="*" aria-label="Multiply">*</button>
<button data-key="7">7</button>
<button data-key="8">8</button>
<button data-key="9">9</button>
<button data-key="-" aria-label="Subtract">-</button>
<button data-key="4">4</button>
<button data-key="5">5</button>
<button data-key="6">6</button>
<button data-key="+" aria-label="Add">+</button>
<button data-key="1">1</button>
<button data-key="2">2</button>
<button data-key="3">3</button>
<button data-key="=" data-action="equals" aria-label="Equals">=</button>
<button data-key="0">0</button>
<button data-key=".">.</button>
</div>
</div>
</body>
</html>
